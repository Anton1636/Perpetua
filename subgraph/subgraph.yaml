specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: DividendVault
    network: sepolia
    source:
      address: '0x8f9d8c1aa4e65c5d45755e2e00f5d3793d0c3241'
      abi: DividendVault
      startBlock: 11279430
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Vault
        - Position
        - Transaction
        - HarvestEvent
      abis:
        - name: DividendVault
          file: ./abis/DividendVault.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
        - event: Harvested(uint256,uint256,uint256)
          handler: handleHarvested
      file: ./src/mapping.ts
